<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;400;600;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./font/all.min.css">
<link rel="stylesheet" href="./css/bootstrap.min.css">
<link rel="stylesheet" href="./css/style.css">
<style>
    body {
        font-family: 'Poppins', sans-serif;
        background-color: #f8f9fa;
    }
    .table-head h3 {
        font-weight: 600;
    }
    .income, .expense, .cash {
        min-height: 150px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
    }
    .income { background: #198754; }
    .expense { background: #0d6efd; }
    .cash { background: #ffc107; color: #000; }
    #expenses th, #expenses td {
        text-align: center;
        padding: 8px;
    }
    @media (max-width: 991px) {
        .search-btn {
            flex-direction: column;
            gap: 10px;
        }
        .income h3, .expense h3, .cash h3 {
            font-size: 1.1rem;
        }
        .income h4, .expense h4, .cash h4 {
            font-size: 1rem;
        }
    }
</style>
</head>
<body>

<section class="table my-4 py-3">
<div class="container">
    <div class="table-head d-flex flex-column flex-lg-row align-items-center justify-content-between mb-3 gap-3">
        <h3>Expense Tracker</h3>
        <div class="search-btn d-flex flex-column flex-lg-row align-items-center gap-2 w-100 w-lg-auto">
            <input type="text" class="form-control search" id="floatingInputValue" placeholder="Search Expense title..." value="">
            <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#incomeModal">Enter Total Income</button>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#expenseModal">Add New Expense</button>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="incomeModal" tabindex="-1" aria-labelledby="incomeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="incomeModalLabel">Happy Month</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Enter your Total Income:</label>
                            <input type="text" class="form-control incomeInput" id="recipient-name">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary sumIncome addExpanseBtn" data-bs-dismiss="modal">Add Income</button>
                    <button type="button" class="btn btn-success d-none updateExpanseBtn" data-bs-dismiss="modal">Update Income</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row text-center g-3">
        <div class="col-lg-4">
            <div class="income p-3 rounded-3 text-white">
                <h3>Your Total Income</h3>
                <h4 class="totalIncome">$0</h4>
                <div>
                    <i class="fa-solid fa-trash text-danger" id="deleteTotalIncome"></i>
                    <i class="fa-regular fa-pen-to-square text-warning" id="updateExpanse" data-bs-toggle="modal" data-bs-target="#incomeModal"></i>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="expense p-3 rounded-3 text-white">
                <h3>Your Total Expense</h3>
                <h4 class="expenseAmount">$0</h4>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="cash p-3 rounded-3">
                <h3>Total Cash On Hand</h3>
                <h4 class="cashOnHand">$0</h4>
            </div>
        </div>
    </div>
</div>

<!-- Expense Table -->
<div class="card my-4 py-4">
<div class="container overflow-auto">
<table id="expenses" class="table table-striped table-bordered text-center">
    <thead class="table-dark">
        <tr class="text-capitalize">
            <th>id</th>
            <th>title</th>
            <th>amount</th>
            <th>category</th>
            <th>date</th>
            <th>action</th>
        </tr>
    </thead>
    <tbody id="expense-body"></tbody>
</table>
</div>
</div>

<!-- Filter -->
<div class="my-3 d-flex gap-2 align-items-center justify-content-center">
    <label for="categoryFilter" class="form-label mb-0 fw-bold">Filter by Category:</label>
    <select id="categoryFilter" class="form-select w-auto">
        <option value="">All</option>
        <option value="مواصلات">مواصلات</option>
        <option value="أكل">أكل</option>
        <option value="سكن">سكن</option>
        <option value="ترفيه">ترفيه</option>
        <option value="تعليم">تعليم</option>
        <option value="صيدلية / أدوية">صيدلية / أدوية</option>
        <option value="ملابس">ملابس</option>
        <option value="Utilities / فواتير">Utilities / فواتير</option>
    </select>
</div>
</section>

<!-- Toast -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 11">
  <div id="action-toast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toast-message">Default message</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="./js/bootstrap.bundle.min.js"></script>
<script type="module" src="./js/main.js"></script>
</body>
</html>
